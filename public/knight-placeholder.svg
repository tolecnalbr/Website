<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32" width="72" height="96">
  <!-- Pixel art farmer SIDE PROFILE - facing left -->

  <!-- === HAT === -->
  <rect x="2" y="1" width="12" height="1" fill="#D4A857"/>
  <rect x="3" y="0" width="8" height="1" fill="#C4983E"/>
  <rect x="5" y="0" width="6" height="1" fill="#D4A857"/>
  <rect x="4" y="1" width="8" height="1" fill="#8B6914"/>

  <!-- === HAIR (side, dark) === -->
  <rect x="11" y="2" width="2" height="3" fill="#2C1810"/>
  <rect x="4" y="2" width="1" height="2" fill="#2C1810"/>

  <!-- === HEAD (side profile) === -->
  <rect x="5" y="2" width="6" height="1" fill="#E8B88A"/>
  <rect x="4" y="3" width="7" height="1" fill="#E8B88A"/>
  <rect x="3" y="4" width="8" height="1" fill="#E8B88A"/>
  <rect x="4" y="5" width="7" height="1" fill="#E8B88A"/>
  <rect x="5" y="6" width="5" height="1" fill="#E8B88A"/>
  <!-- Eye (single, profile) -->
  <rect x="5" y="3" width="2" height="1" fill="#1a1a1a"/>
  <!-- Nose -->
  <rect x="3" y="4" width="1" height="1" fill="#D4A070"/>
  <!-- Mouth area -->
  <rect x="4" y="5" width="1" height="1" fill="#C4946A"/>

  <!-- === HAY STRAW in mouth === -->
  <rect x="0" y="5" width="4" height="1" fill="#D4A857"/>

  <!-- === NECK === -->
  <rect x="7" y="7" width="3" height="1" fill="#E8B88A"/>

  <!-- === SHIRT (yellow, side view) === -->
  <rect x="6" y="8" width="5" height="1" fill="#E8C840"/>
  <rect x="6" y="9" width="5" height="1" fill="#D4B030"/>

  <!-- === ARM (front arm, holding pickaxe) === -->
  <rect x="4" y="8" width="2" height="1" fill="#E8C840"/>
  <rect x="3" y="9" width="2" height="1" fill="#E8C840"/>
  <rect x="3" y="10" width="2" height="1" fill="#E8B88A"/>

  <!-- === PICKAXE === -->
  <rect x="2" y="11" width="1" height="1" fill="#8B4513"/>
  <rect x="1" y="12" width="1" height="1" fill="#8B4513"/>
  <rect x="1" y="13" width="1" height="1" fill="#6B3410"/>
  <rect x="0" y="14" width="1" height="1" fill="#6B3410"/>
  <rect x="0" y="15" width="3" height="1" fill="#888"/>
  <rect x="0" y="16" width="1" height="1" fill="#777"/>
  <rect x="2" y="16" width="1" height="1" fill="#777"/>

  <!-- === OVERALLS (blue, side view) === -->
  <rect x="6" y="10" width="5" height="1" fill="#4466AA"/>
  <rect x="6" y="11" width="5" height="1" fill="#3355AA"/>
  <rect x="6" y="12" width="5" height="1" fill="#4466AA"/>
  <rect x="6" y="13" width="5" height="1" fill="#3355AA"/>
  <!-- Strap -->
  <rect x="7" y="9" width="1" height="1" fill="#4466AA"/>
  <!-- Pocket -->
  <rect x="7" y="11" width="2" height="1" fill="#2244AA"/>

  <!-- === LEGS (side profile, one in front of other) === -->
  <!-- Back leg -->
  <g id="leg-right" class="leg-right">
    <rect x="8" y="14" width="3" height="1" fill="#3355AA"/>
    <rect x="8" y="15" width="3" height="1" fill="#4466AA"/>
    <rect x="8" y="16" width="3" height="1" fill="#3355AA"/>
    <rect x="8" y="17" width="3" height="1" fill="#3355AA"/>
    <!-- Boot -->
    <rect x="7" y="18" width="4" height="1" fill="#555"/>
    <rect x="6" y="19" width="5" height="1" fill="#444"/>
  </g>

  <!-- Front leg -->
  <g id="leg-left" class="leg-left">
    <rect x="6" y="14" width="3" height="1" fill="#4466AA"/>
    <rect x="6" y="15" width="3" height="1" fill="#3355AA"/>
    <rect x="6" y="16" width="3" height="1" fill="#4466AA"/>
    <rect x="6" y="17" width="3" height="1" fill="#3355AA"/>
    <!-- Boot -->
    <rect x="5" y="18" width="4" height="1" fill="#555"/>
    <rect x="4" y="19" width="5" height="1" fill="#444"/>
  </g>
</svg>
