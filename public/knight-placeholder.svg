<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" width="96" height="144">
  <!-- Pixel art knight with pickaxe - 16-bit retro style -->
  <!-- Each "pixel" is a 1x1 rect -->

  <!-- === PICKAXE (held in right hand, viewer's left) === -->
  <!-- Handle (diagonal) -->
  <rect x="3" y="12" width="1" height="1" fill="#6B3410"/>
  <rect x="4" y="13" width="1" height="1" fill="#6B3410"/>
  <rect x="5" y="14" width="1" height="1" fill="#8B4513"/>
  <rect x="6" y="15" width="1" height="1" fill="#8B4513"/>
  <rect x="7" y="16" width="1" height="1" fill="#8B4513"/>
  <rect x="8" y="17" width="1" height="1" fill="#8B4513"/>
  <rect x="9" y="18" width="1" height="1" fill="#8B4513"/>
  <rect x="10" y="19" width="1" height="1" fill="#6B3410"/>
  <!-- Pickaxe head -->
  <rect x="1" y="10" width="1" height="1" fill="#888888"/>
  <rect x="2" y="11" width="1" height="1" fill="#aaaaaa"/>
  <rect x="3" y="11" width="1" height="1" fill="#999999"/>
  <rect x="1" y="11" width="1" height="1" fill="#777777"/>
  <rect x="0" y="10" width="1" height="1" fill="#777777"/>
  <rect x="4" y="11" width="1" height="1" fill="#888888"/>
  <rect x="5" y="12" width="1" height="1" fill="#888888"/>
  <rect x="0" y="9" width="1" height="1" fill="#666666"/>
  <rect x="1" y="9" width="1" height="1" fill="#aaaaaa"/>
  <rect x="2" y="10" width="1" height="1" fill="#aaaaaa"/>
  <rect x="5" y="13" width="1" height="1" fill="#777777"/>
  <!-- Pickaxe tip -->
  <rect x="6" y="13" width="1" height="1" fill="#666666"/>

  <!-- === HELMET === -->
  <!-- Helmet top -->
  <rect x="13" y="0" width="6" height="1" fill="#b0b0b0"/>
  <rect x="12" y="1" width="8" height="1" fill="#b0b0b0"/>
  <!-- Helmet sides -->
  <rect x="11" y="2" width="1" height="3" fill="#8a8a8a"/>
  <rect x="20" y="2" width="1" height="3" fill="#8a8a8a"/>
  <!-- Helmet face area -->
  <rect x="12" y="2" width="8" height="1" fill="#d0d0d0"/>
  <rect x="12" y="3" width="8" height="1" fill="#b0b0b0"/>
  <!-- Visor slit -->
  <rect x="13" y="4" width="6" height="1" fill="#1a1a1a"/>
  <!-- Visor highlight -->
  <rect x="14" y="4" width="2" height="1" fill="#3a3a5a"/>
  <!-- Helmet bottom / chin guard -->
  <rect x="12" y="5" width="8" height="1" fill="#8a8a8a"/>
  <rect x="13" y="6" width="6" height="1" fill="#8a8a8a"/>
  <!-- Helmet plume/crest -->
  <rect x="15" y="0" width="2" height="1" fill="#d0d0d0"/>
  <!-- Dark outline top -->
  <rect x="12" y="0" width="1" height="1" fill="#1a1a1a"/>
  <rect x="19" y="0" width="1" height="1" fill="#1a1a1a"/>

  <!-- === SHOULDER PAULDRONS === -->
  <!-- Left pauldron (viewer's left) -->
  <rect x="9" y="7" width="3" height="2" fill="#b0b0b0"/>
  <rect x="9" y="7" width="3" height="1" fill="#d0d0d0"/>
  <rect x="8" y="8" width="1" height="1" fill="#8a8a8a"/>
  <!-- Right pauldron -->
  <rect x="20" y="7" width="3" height="2" fill="#b0b0b0"/>
  <rect x="20" y="7" width="3" height="1" fill="#d0d0d0"/>
  <rect x="23" y="8" width="1" height="1" fill="#8a8a8a"/>

  <!-- === TORSO / PLATE ARMOR === -->
  <rect x="12" y="7" width="8" height="2" fill="#b0b0b0"/>
  <rect x="11" y="9" width="10" height="2" fill="#8a8a8a"/>
  <rect x="11" y="11" width="10" height="2" fill="#b0b0b0"/>
  <rect x="11" y="13" width="10" height="1" fill="#8a8a8a"/>
  <!-- Chest detail / armor line -->
  <rect x="15" y="8" width="2" height="3" fill="#d0d0d0"/>
  <rect x="16" y="7" width="1" height="1" fill="#d0d0d0"/>
  <!-- Armor shadow -->
  <rect x="12" y="9" width="1" height="2" fill="#777777"/>
  <rect x="20" y="9" width="1" height="2" fill="#777777"/>

  <!-- === ARMS === -->
  <!-- Left arm (viewer's left, holding pickaxe) -->
  <rect x="9" y="9" width="2" height="2" fill="#8a8a8a"/>
  <rect x="9" y="11" width="2" height="3" fill="#b0b0b0"/>
  <rect x="10" y="14" width="2" height="2" fill="#8a8a8a"/>
  <!-- Gauntlet -->
  <rect x="10" y="16" width="2" height="2" fill="#777777"/>
  <rect x="10" y="18" width="2" height="1" fill="#8a8a8a"/>
  <!-- Right arm -->
  <rect x="21" y="9" width="2" height="2" fill="#8a8a8a"/>
  <rect x="21" y="11" width="2" height="3" fill="#b0b0b0"/>
  <rect x="21" y="14" width="2" height="2" fill="#8a8a8a"/>
  <!-- Right gauntlet -->
  <rect x="21" y="16" width="2" height="2" fill="#777777"/>

  <!-- === BELT === -->
  <rect x="11" y="14" width="10" height="1" fill="#1a1a1a"/>
  <rect x="15" y="14" width="2" height="1" fill="#8B4513"/>
  <!-- Belt buckle -->
  <rect x="15" y="14" width="2" height="1" fill="#b8860b"/>

  <!-- === CAPE (behind, accent color) === -->
  <rect x="21" y="8" width="2" height="8" fill="#4a4a8a"/>
  <rect x="22" y="16" width="2" height="6" fill="#4a4a8a"/>
  <rect x="23" y="22" width="2" height="4" fill="#3a3a7a"/>
  <rect x="22" y="22" width="1" height="2" fill="#4a4a8a"/>
  <!-- Cape highlight -->
  <rect x="21" y="9" width="1" height="4" fill="#5a5a9a"/>

  <!-- === LEGS / TASSETS === -->
  <!-- Tassets (armor skirt) -->
  <rect x="11" y="15" width="10" height="2" fill="#8a8a8a"/>
  <rect x="12" y="15" width="3" height="2" fill="#b0b0b0"/>
  <rect x="17" y="15" width="3" height="2" fill="#b0b0b0"/>
  <!-- Gap between legs -->
  <rect x="15" y="17" width="2" height="1" fill="#1a1a1a"/>

  <!-- Left leg -->
  <rect x="11" y="17" width="4" height="2" fill="#8a8a8a"/>
  <rect x="11" y="19" width="4" height="2" fill="#b0b0b0"/>
  <rect x="11" y="21" width="4" height="2" fill="#8a8a8a"/>
  <!-- Knee highlight -->
  <rect x="12" y="19" width="2" height="1" fill="#d0d0d0"/>

  <!-- Right leg -->
  <rect x="17" y="17" width="4" height="2" fill="#8a8a8a"/>
  <rect x="17" y="19" width="4" height="2" fill="#b0b0b0"/>
  <rect x="17" y="21" width="4" height="2" fill="#8a8a8a"/>
  <!-- Knee highlight -->
  <rect x="18" y="19" width="2" height="1" fill="#d0d0d0"/>

  <!-- === BOOTS === -->
  <!-- Left boot -->
  <rect x="10" y="23" width="5" height="2" fill="#555555"/>
  <rect x="10" y="25" width="5" height="2" fill="#444444"/>
  <rect x="9" y="26" width="2" height="1" fill="#444444"/>
  <!-- Boot sole -->
  <rect x="9" y="27" width="6" height="1" fill="#333333"/>
  <!-- Boot highlight -->
  <rect x="11" y="23" width="1" height="2" fill="#666666"/>

  <!-- Right boot -->
  <rect x="17" y="23" width="5" height="2" fill="#555555"/>
  <rect x="17" y="25" width="5" height="2" fill="#444444"/>
  <rect x="21" y="26" width="2" height="1" fill="#444444"/>
  <!-- Boot sole -->
  <rect x="17" y="27" width="6" height="1" fill="#333333"/>
  <!-- Boot highlight -->
  <rect x="18" y="23" width="1" height="2" fill="#666666"/>

  <!-- === DARK OUTLINE (selective edges) === -->
  <rect x="11" y="1" width="1" height="1" fill="#1a1a1a"/>
  <rect x="20" y="1" width="1" height="1" fill="#1a1a1a"/>
  <rect x="10" y="5" width="2" height="1" fill="#1a1a1a"/>
  <rect x="20" y="5" width="2" height="1" fill="#1a1a1a"/>
</svg>
